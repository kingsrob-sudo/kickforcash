<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Georgia Lottery Soccer Kick</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      -webkit-user-select: none;
    }

    body {
      font-family: 'Arial', sans-serif;
      background: #000;
      color: #fff;
      overflow: hidden;
      touch-action: none;
      position: fixed;
      width: 100%;
      height: 100%;
    }

    canvas {
      display: block;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }

    /* Start Screen Overlay */
    #startScreen {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: linear-gradient(135deg, #4D200B 0%, #1a0a03 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
      transition: opacity 0.4s ease;
    }

    #startScreen.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .start-logo {
      font-size: 1.2rem;
      font-weight: bold;
      color: #FFB27A;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 0.5rem;
    }

    .start-title {
      font-size: 2.5rem;
      font-weight: 900;
      color: #fff;
      text-align: center;
      line-height: 1.1;
      margin-bottom: 0.5rem;
      text-transform: uppercase;
    }

    .start-title span {
      color: #48A943;
    }

    .start-subtitle {
      font-size: 1rem;
      color: rgba(255,255,255,0.6);
      margin-bottom: 3rem;
      text-align: center;
    }

    .start-btn {
      padding: 1.2rem 4rem;
      font-size: 1.4rem;
      font-weight: bold;
      background: #48A943;
      color: #fff;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 2px;
      box-shadow: 0 8px 30px rgba(72, 169, 67, 0.4);
      transition: transform 0.15s ease;
    }

    .start-btn:active {
      transform: scale(0.95);
    }

    .start-hint {
      margin-top: 2rem;
      font-size: 0.85rem;
      color: rgba(255,255,255,0.35);
    }

    /* End Screen */
    #endScreen {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: linear-gradient(135deg, #4D200B 0%, #1a0a03 100%);
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }

    #endScreen.active {
      display: flex;
    }

    .end-label {
      font-size: 1rem;
      color: #FFB27A;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 0.5rem;
    }

    .end-title {
      font-size: 2rem;
      font-weight: 900;
      text-transform: uppercase;
      margin-bottom: 2rem;
    }

    .end-score {
      font-size: 5rem;
      font-weight: 900;
      color: #48A943;
      line-height: 1;
      margin-bottom: 0.5rem;
    }

    .end-score-label {
      font-size: 1rem;
      color: rgba(255,255,255,0.5);
      margin-bottom: 3rem;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    .end-btn {
      padding: 1rem 3rem;
      font-size: 1.2rem;
      font-weight: bold;
      background: #48A943;
      color: #fff;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 2px;
      box-shadow: 0 8px 30px rgba(72, 169, 67, 0.4);
      transition: transform 0.15s ease;
    }

    .end-btn:active {
      transform: scale(0.95);
    }
  </style>
</head>
<body>

  <canvas id="gameCanvas"></canvas>

  <!-- Start Screen -->
  <div id="startScreen">
    <div class="start-logo">Georgia Lottery</div>
    <div class="start-title">Soccer<br><span>Kick</span></div>
    <div class="start-subtitle">Flick the ball. Hit the targets. Win big.</div>
    <button class="start-btn" id="startBtn">Play</button>
    <div class="start-hint">Swipe across the ball to shoot</div>
    <div style="margin-top: 1.5rem; font-size: 0.7rem; color: rgba(255,255,255,0.2); letter-spacing: 1px;">v1.1</div>
  </div>

  <!-- End Screen -->
  <div id="endScreen">
    <div class="end-label">Time's Up!</div>
    <div class="end-title">Final Score</div>
    <div class="end-score" id="finalScore">0</div>
    <div class="end-score-label">Points</div>
    <button class="end-btn" id="replayBtn">Play Again</button>
  </div>

  <script>
    // ============================================================
    // CANVAS SETUP
    // ============================================================
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    // Design at 9:16 aspect ratio
    const ASPECT = 9 / 16;
    let W, H, scale;

    // Internal game resolution
    const GW = 540;
    const GH = 960;

    function resize() {
      const ww = window.innerWidth;
      const wh = window.innerHeight;
      const windowAspect = ww / wh;

      if (windowAspect > ASPECT) {
        // Window is wider than 9:16 — fit to height
        H = wh;
        W = wh * ASPECT;
      } else {
        // Window is taller or equal — fit to width
        W = ww;
        H = ww / ASPECT;
      }

      canvas.width = W;
      canvas.height = H;
      scale = W / GW;
    }

    window.addEventListener('resize', resize);
    resize();

    // ============================================================
    // BACKGROUND VIDEO
    // ============================================================
    const bgVideo = document.createElement('video');
    bgVideo.src = 'gameplayBG.mp4';
    bgVideo.loop = true;
    bgVideo.muted = true;
    bgVideo.playsInline = true;
    bgVideo.preload = 'auto';
    let bgVideoReady = false;
    bgVideo.addEventListener('canplaythrough', () => { bgVideoReady = true; });
    // Also keep the static image as fallback
    const bgImage = new Image();
    bgImage.src = 'gameplayBG.jpg';
    let bgLoaded = false;
    bgImage.onload = () => { bgLoaded = true; };

    // ============================================================
    // BALL SPRITE SHEET
    // ============================================================
    const ballSheet = new Image();
    ballSheet.src = 'ball_all_.png';
    let ballSheetLoaded = false;
    ballSheet.onload = () => { ballSheetLoaded = true; };

    // Sprite sheet config: 8x8 grid, 128px cells, ball ~88x86 centered
    const SPRITE_COLS = 8;
    const SPRITE_ROWS = 8;
    const SPRITE_CELL = 128;
    const SPRITE_TOTAL = 64;
    let ballFrame = 0;         // current frame index (0-63)
    let ballFrameAccum = 0;    // accumulator for frame stepping

    // ============================================================
    // GAME STATE
    // ============================================================
    let gameState = 'start'; // start | playing | ended
    let score = 0;
    let timeLeft = 60;
    let timerInterval = null;

    // Dead balls — balls that finished bouncing but linger in the net
    let deadBalls = []; // { x, y, visualScale, frame, spawnTime }

    // Ball — parabolic 3D-faked flight with bouncing
    // The "ground plane" ends at the horizon line = bottom of goal
    // Ball arcs up, lands at horizon, bounces a few times, then despawns
    // Starts at 2x size and shrinks to 1x as it flies away
    const BALL_RADIUS = 30; // base radius at "normal" size
    const ball = {
      x: GW / 2,          // screen x
      y: GH - 125,        // screen y
      radius: BALL_RADIUS,
      homeX: GW / 2,
      homeY: GH - 125,
      flying: false,
      visualScale: 2.6,   // starts at 2.6x, shrinks to ~0.45x in flight
      restingScale: 2.6,  // the scale when sitting at home
      // Flight params (set on kick)
      groundX: 0,
      groundY: 0,
      startX: 0,
      startY: 0,
      targetX: 0,
      targetY: 0,
      flightT: 0,
      flightSpeed: 0,
      arcHeight: 0,
      ballHeight: 0,
      // Spin — curves the ball left/right during flight
      spin: 0,            // negative = hooks left, positive = hooks right
      rotation: 0,        // visual rotation angle in radians
      rotationSpeed: 0,   // how fast the ball visually spins
      // Bounce state
      phase: 'arc',       // 'arc' | 'bounce' | 'done'
      bounceVY: 0,
      bounceCount: 0,
      bounceGroundY: 0,
      bounceVX: 0,
    };

    // Swipe-across tracking
    // Full flow: swipe across ball → lift finger → line stays visible → ball launches
    let touchActive = false;
    let allTouchPoints = [];   // ALL points for trail drawing, analysis & curvature
    let kickFired = false;
    let crossedBall = false;   // did the swipe pass through the ball?
    let swipeTrailDisplay = []; // persisted trail shown after finger lifts
    let swipeTrailFade = 0;     // countdown for fading the trail after kick

    // Goal dimensions — mapped to gameplayBG.jpg
    const goal = {
      x: 77,
      y: 265,
      width: 386,
      height: 175,
      postWidth: 10,
      netColor: 'rgba(255,255,255,0.0)',
    };

    // Targets
    const TARGET_COUNT = 5;
    let targets = [];

    function spawnTargets() {
      targets = [];
      const padding = 20;
      const usableW = goal.width - padding * 2;
      const usableH = goal.height - padding * 2;

      const positions = [
        { x: 0.08, y: 0.2 },
        { x: 0.92, y: 0.2 },
        { x: 0.5, y: 0.15 },
        { x: 0.18, y: 0.78 },
        { x: 0.82, y: 0.78 },
      ];

      for (let i = 0; i < TARGET_COUNT; i++) {
        const pos = positions[i];
        targets.push({
          x: goal.x + padding + usableW * pos.x,
          y: goal.y + padding + usableH * pos.y,
          radius: 44,
          alive: true,
          hitAnim: 0,
        });
      }
    }

    // Particles for hit effects
    let particles = [];

    function spawnParticles(x, y) {
      for (let i = 0; i < 12; i++) {
        const angle = (Math.PI * 2 * i) / 12 + Math.random() * 0.3;
        const speed = 2 + Math.random() * 4;
        particles.push({
          x, y,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          life: 1.0,
          size: 3 + Math.random() * 4,
          color: Math.random() > 0.5 ? '#48A943' : '#FFB27A',
        });
      }
    }

    // Score popup
    let scorePopups = [];

    function spawnScorePopup(x, y, points) {
      scorePopups.push({
        x, y,
        text: '+' + points,
        life: 1.0,
      });
    }

    // ============================================================
    // INPUT HANDLING — swipe across ball, analyze on release
    // ============================================================
    function getInputPos(e) {
      const rect = canvas.getBoundingClientRect();
      let clientX, clientY;
      if (e.touches) {
        clientX = e.touches[0].clientX;
        clientY = e.touches[0].clientY;
      } else {
        clientX = e.clientX;
        clientY = e.clientY;
      }
      return {
        x: (clientX - rect.left) / scale,
        y: (clientY - rect.top) / scale,
      };
    }

    function distTo(ax, ay, bx, by) {
      return Math.sqrt((ax - bx) ** 2 + (ay - by) ** 2);
    }

    canvas.addEventListener('touchstart', onDown, { passive: false });
    canvas.addEventListener('mousedown', onDown);

    canvas.addEventListener('touchmove', onMove, { passive: false });
    canvas.addEventListener('mousemove', onMove);

    canvas.addEventListener('touchend', onUp);
    canvas.addEventListener('mouseup', onUp);

    function onDown(e) {
      e.preventDefault();
      if (gameState !== 'playing' || ball.flying) return;

      touchActive = true;
      kickFired = false;
      crossedBall = false;
      allTouchPoints = [];
      swipeTrailDisplay = [];
      swipeTrailFade = 0;
      const pos = getInputPos(e);
      allTouchPoints.push({ x: pos.x, y: pos.y, time: Date.now() });
    }

    function onMove(e) {
      e.preventDefault();
      if (!touchActive || kickFired) return;

      const pos = getInputPos(e);
      const now = Date.now();
      allTouchPoints.push({ x: pos.x, y: pos.y, time: now });

      // Check if finger has crossed through the ball zone
      if (!crossedBall) {
        const hitRadius = ball.radius * ball.visualScale * 1.2;
        const dist = distTo(pos.x, pos.y, ball.x, ball.y);
        if (dist < hitRadius) {
          crossedBall = true;
        }
      }
    }

    function onUp(e) {
      if (!touchActive) return;
      touchActive = false;

      // Only kick if the swipe crossed through the ball
      if (!crossedBall || allTouchPoints.length < 4 || kickFired) {
        allTouchPoints = [];
        return;
      }

      // Persist the trail for display
      swipeTrailDisplay = [...allTouchPoints];
      swipeTrailFade = 1.0;

      // ── ANALYZE THE FULL SWIPE ──
      const pts = allTouchPoints;

      // 1) DIRECTION & POWER from start → end point
      const startPt = pts[0];
      const endPt = pts[pts.length - 1];
      const dx = endPt.x - startPt.x;
      const dy = endPt.y - startPt.y;
      const swipeLength = Math.sqrt(dx * dx + dy * dy);

      if (swipeLength < 15 || dy > -5) {
        allTouchPoints = [];
        return;
      }

      // 2) SPIN from deviation off the center line
      //    Measure how far each point strays left/right of the start→end line
      //    Positive deviation = finger went RIGHT of center → ball curves LEFT
      const spinDeviation = calculateSpinDeviation(pts);

      // Fire the kick with a tiny delay so player sees the full trail
      kickFired = true;
      setTimeout(() => {
        fireKick(dx, dy, swipeLength, spinDeviation);
      }, 120);

      allTouchPoints = [];
    }

    // Measure average signed deviation of swipe path from the center line (start→end)
    // Positive = finger curved to the RIGHT of center line
    // Negative = finger curved to the LEFT of center line
    function calculateSpinDeviation(pts) {
      if (pts.length < 4) return 0;

      const startPt = pts[0];
      const endPt = pts[pts.length - 1];
      const lineDx = endPt.x - startPt.x;
      const lineDy = endPt.y - startPt.y;
      const lineLen = Math.sqrt(lineDx * lineDx + lineDy * lineDy);

      if (lineLen < 10) return 0;

      // Unit normal to the center line (perpendicular, pointing right)
      const nx = -lineDy / lineLen;
      const ny = lineDx / lineLen;

      // For each point, compute signed distance from the center line
      let totalDeviation = 0;
      let maxDeviation = 0;

      for (let i = 1; i < pts.length - 1; i++) {
        const px = pts[i].x - startPt.x;
        const py = pts[i].y - startPt.y;
        // Signed distance: positive = right of line, negative = left
        const signedDist = px * nx + py * ny;
        totalDeviation += signedDist;
        if (Math.abs(signedDist) > Math.abs(maxDeviation)) {
          maxDeviation = signedDist;
        }
      }

      // Use a blend of average and max deviation for a good feel
      const avgDeviation = totalDeviation / (pts.length - 2);
      return avgDeviation * 0.6 + maxDeviation * 0.4;
    }

    function fireKick(dx, dy, swipeLength, spinDeviation) {
      // Power from swipe length — normalize to 0..1 range
      // A short flick (~50px) = weak, a long swipe (~300px+) = full power
      const power = Math.min(swipeLength / 250, 1.0);

      // Direction from the start→end vector angle
      const angle = Math.atan2(dy, dx);
      // Convert angle to horizontal aim: how far left/right of center the ball goes
      // dx drives horizontal aim, scaled by swipe length for longer = more reach
      const aimX = ball.homeX + dx * 3.9;
      const clampedX = Math.max(goal.x + 20, Math.min(goal.x + goal.width - 20, aimX));
      const horizonY = goal.y + goal.height;

      // Spin from deviation — OPPOSITE direction
      // Finger curved right → ball hooks left (negative spin)
      // Finger curved left → ball hooks right (positive spin)
      const spinAmount = Math.max(-4, Math.min(4, -spinDeviation * 0.08));

      ball.startX = ball.homeX;
      ball.startY = ball.homeY;
      ball.groundX = ball.homeX;
      ball.groundY = ball.homeY;
      ball.targetX = clampedX;
      ball.targetY = horizonY;
      ball.flightT = 0;
      ball.flightSpeed = (0.012 + power * 0.015) * 0.5;
      ball.arcHeight = 100 + power * 180; // longer swipe = higher arc
      ball.ballHeight = 0;
      ball.flying = true;
      ball.visualScale = ball.restingScale;
      ball.phase = 'arc';
      ball.spin = spinAmount;
      ball.rotation = 0;
      ball.rotationSpeed = spinAmount * 0.12;
      ball.bounceCount = 0;
      ball.bounceVY = 0;
      ball.bounceVX = 0;
      ball.bounceGroundY = horizonY;
    }

    // ============================================================
    // GAME LOGIC
    // ============================================================
    function startGame() {
      score = 0;
      timeLeft = 60;
      ball.x = ball.homeX;
      ball.y = ball.homeY;
      ball.groundX = ball.homeX;
      ball.groundY = ball.homeY;
      ball.flightT = 0;
      ball.ballHeight = 0;
      ball.flying = false;
      ball.visualScale = ball.restingScale;
      ball.phase = 'arc';
      ball.bounceCount = 0;
      ball.bounceVY = 0;
      ball.bounceVX = 0;
      particles = [];
      scorePopups = [];
      deadBalls = [];
      spawnTargets();
      gameState = 'playing';

      // Start background video (needs user interaction trigger on mobile)
      bgVideo.play().catch(e => console.log('Video autoplay blocked:', e));

      document.getElementById('startScreen').classList.add('hidden');
      document.getElementById('endScreen').classList.remove('active');

      timerInterval = setInterval(() => {
        timeLeft--;
        if (timeLeft <= 0) {
          timeLeft = 0;
          endGame();
        }
      }, 1000);
    }

    function endGame() {
      gameState = 'ended';
      clearInterval(timerInterval);
      document.getElementById('finalScore').textContent = score;
      document.getElementById('endScreen').classList.add('active');
    }

    function resetBall() {
      ball.x = ball.homeX;
      ball.y = ball.homeY;
      ball.groundX = ball.homeX;
      ball.groundY = ball.homeY;
      ball.flightT = 0;
      ball.ballHeight = 0;
      ball.flying = false;
      ball.visualScale = ball.restingScale;
      ball.phase = 'arc';
      ball.spin = 0;
      ball.rotation = 0;
      ball.rotationSpeed = 0;
      ball.bounceCount = 0;
      ball.bounceVY = 0;
      ball.bounceVX = 0;
    }

    function updateBall() {
      if (!ball.flying) return;

      // The back wall of the net — ball hits this before reaching the ground
      // Sits about 70% of the way from crossbar to horizon (like 10ft behind the goal line)
      const netWallY = goal.y + goal.height * 0.7;
      // In screen terms, this is a vertical wall at that Y depth

      if (ball.phase === 'arc') {
        // ── ARC PHASE: parametric parabola from player to horizon ──
        ball.flightT += ball.flightSpeed;

        const t = Math.min(ball.flightT, 1.0);

        // Ground position: linear interpolation + spin curve offset
        const linearX = ball.startX + (ball.targetX - ball.startX) * t;
        const linearY = ball.startY + (ball.targetY - ball.startY) * t;

        // Spin curves the ball sideways — bends MORE toward the end of flight
        // t^3 means: barely any curve early, dramatic bend late (banana kick feel)
        const spinOffset = ball.spin * Math.pow(t, 3) * 120;

        ball.groundX = linearX + spinOffset;
        ball.groundY = linearY;

        // Update visual rotation
        ball.rotation += ball.rotationSpeed;

        // Parabolic height: peaks at t=0.5, zero at t=0 and t=1
        ball.ballHeight = 4 * ball.arcHeight * t * (1 - t);

        // Screen position: ground position minus height (up is negative Y)
        ball.x = ball.groundX;
        ball.y = ball.groundY - ball.ballHeight;

        // Perspective shrink with ease-out: 2.0 at player → ~0.45 at goal
        const depthProgress = Math.max(0, Math.min(1, (ball.homeY - ball.groundY) / (ball.homeY - ball.bounceGroundY)));
        const easedDepth = 1 - Math.pow(1 - depthProgress, 2.5);
        const farScale = 0.45;
        ball.visualScale = ball.restingScale - easedDepth * (ball.restingScale - farScale);

        // Check collisions during flight
        checkTargetCollisions();

        // ── NET WALL CHECK: ball hit the back of the net? ──
        if (ball.groundY <= netWallY && ball.ballHeight > 0) {
          // Ball has reached the back of the net while still airborne
          ball.phase = 'bounce';
          // Bounce off the net wall — good initial bounce energy
          ball.bounceVY = -6; // strong upward bounce off the net
          ball.bounceVX = ball.spin * 0.5;
          ball.bounceGroundY = ball.groundY;
          // Ball keeps its current height — it bounces off the wall, not the floor
        }

        // Arc complete without hitting net (weak kick that drops early)
        if (ball.flightT >= 1.0 && ball.phase === 'arc') {
          ball.phase = 'bounce';
          ball.bounceVY = -2;
          ball.bounceVX = (ball.targetX - ball.startX) * 0.002;
          ball.ballHeight = 0;
          ball.bounceGroundY = ball.groundY;
        }

        // Ball went off screen sideways
        if (ball.x < -50 || ball.x > GW + 50) {
          ball.phase = 'done';
          setTimeout(resetBall, 100);
          ball.flying = false;
        }

      } else if (ball.phase === 'bounce') {
        // ── BOUNCE PHASE: ball hit the net wall, now bouncing down ──
        const gravity = 0.5;

        ball.bounceVY += gravity;
        ball.ballHeight -= ball.bounceVY;
        ball.groundX += ball.bounceVX;
        ball.rotation += ball.rotationSpeed * 0.5;

        // Ball drops to the net floor
        if (ball.ballHeight <= 0) {
          ball.ballHeight = 0;
          ball.bounceCount++;

          if (ball.bounceCount >= 5) {
            // Done bouncing — leave a dead ball in the net and reset
            deadBalls.push({
              x: ball.groundX,
              y: ball.bounceGroundY,
              visualScale: ball.visualScale,
              frame: ballFrame,
              spawnTime: Date.now(),
            });
            ball.phase = 'done';
            resetBall();
            return;
          }

          // Bounce back up — bouncier! (0.55 restitution instead of 0.4)
          ball.bounceVY = ball.bounceVY * -0.55;
          ball.bounceVX *= 0.7;
        }

        // Screen position — stays at the net wall depth
        ball.x = ball.groundX;
        ball.y = ball.bounceGroundY - ball.ballHeight;

        // Keep checking collisions during bounces
        checkTargetCollisions();
      }
    }

    function checkTargetCollisions() {
      const ballEffectiveRadius = ball.radius * ball.visualScale;
      for (const t of targets) {
        if (!t.alive) continue;
        // Check if ball overlaps target — use the screen position (ball.x, ball.y)
        // but also check ground proximity to see if the ball is at the right "depth"
        const d = distTo(ball.x, ball.y, t.x, t.y);
        if (d < ballEffectiveRadius + t.radius) {
          t.alive = false;
          t.hitAnim = 1;
          score += 100;
          spawnParticles(t.x, t.y);
          spawnScorePopup(t.x, t.y - 30, 100);

          // Check if all targets are down
          if (targets.every(tt => !tt.alive)) {
            setTimeout(() => {
              if (gameState === 'playing') spawnTargets();
            }, 600);
          }
        }
      }
    }

    function updateParticles() {
      for (const p of particles) {
        p.x += p.vx;
        p.y += p.vy;
        p.vy += 0.1;
        p.life -= 0.025;
      }
      particles = particles.filter(p => p.life > 0);
    }

    function updateScorePopups() {
      for (const s of scorePopups) {
        s.y -= 1.5;
        s.life -= 0.02;
      }
      scorePopups = scorePopups.filter(s => s.life > 0);
    }

    // ============================================================
    // RENDERING
    // ============================================================
    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.save();
      ctx.scale(scale, scale);

      drawBackground();
      drawBallShadow();
      drawDeadBalls();
      drawTargets();
      drawParticles();
      drawBall();
      drawScorePopups();
      drawHUD();
      drawSwipeTrail();

      ctx.restore();
    }

    function drawBackground() {
      if (bgVideoReady && !bgVideo.paused) {
        // Draw the looping video as background
        ctx.drawImage(bgVideo, 0, 0, GW, GH);
      } else if (bgLoaded) {
        // Fallback to static image
        ctx.drawImage(bgImage, 0, 0, GW, GH);
      } else {
        ctx.fillStyle = '#1a3a1a';
        ctx.fillRect(0, 0, GW, GH);
      }
    }

    function drawBallShadow() {
      // Ground-plane shadow during flight — gives depth cue
      if (ball.flying) {
        const shadowScale = ball.visualScale;
        const r = ball.radius * shadowScale;
        const shadowAlpha = 0.3 * (1 - ball.flightT * 0.5);
        ctx.fillStyle = `rgba(0,0,0,${shadowAlpha})`;
        ctx.beginPath();
        ctx.ellipse(ball.groundX, ball.groundY, r * 0.9, r * 0.25, 0, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    function drawDeadBalls() {
      if (!ballSheetLoaded) return;
      const now = Date.now();

      for (const db of deadBalls) {
        const age = (now - db.spawnTime) / 1000; // seconds
        // Fade out in the last 2 seconds
        let alpha = 1.0;
        if (age > 8) {
          alpha = 1 - (age - 8) / 2;
        }
        if (alpha <= 0) continue;

        const r = BALL_RADIUS * db.visualScale;
        const spriteScale = 1.5;
        const drawSize = r * 2 * spriteScale;

        const col = db.frame % SPRITE_COLS;
        const row = Math.floor(db.frame / SPRITE_COLS);
        const sx = col * SPRITE_CELL;
        const sy = row * SPRITE_CELL;

        ctx.globalAlpha = alpha;
        ctx.drawImage(
          ballSheet,
          sx, sy, SPRITE_CELL, SPRITE_CELL,
          db.x - drawSize / 2, db.y - drawSize / 2, drawSize, drawSize
        );
        ctx.globalAlpha = 1;
      }
    }

    function drawTargets() {
      for (const t of targets) {
        if (!t.alive) {
          // Hit animation: fade out
          if (t.hitAnim > 0) {
            t.hitAnim -= 0.05;
            ctx.globalAlpha = t.hitAnim;
            ctx.fillStyle = '#FFB27A';
            ctx.beginPath();
            ctx.arc(t.x, t.y, t.radius * (1 + (1 - t.hitAnim) * 0.5), 0, Math.PI * 2);
            ctx.fill();
            ctx.globalAlpha = 1;
          }
          continue;
        }

        // Target outer ring
        ctx.fillStyle = '#FFB27A';
        ctx.beginPath();
        ctx.arc(t.x, t.y, t.radius, 0, Math.PI * 2);
        ctx.fill();

        // Target inner ring
        ctx.fillStyle = '#4D200B';
        ctx.beginPath();
        ctx.arc(t.x, t.y, t.radius * 0.7, 0, Math.PI * 2);
        ctx.fill();

        // Target bullseye
        ctx.fillStyle = '#48A943';
        ctx.beginPath();
        ctx.arc(t.x, t.y, t.radius * 0.35, 0, Math.PI * 2);
        ctx.fill();

        // Points label
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 18px Arial';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('100', t.x, t.y);
      }
    }

    function drawBall() {
      const r = ball.radius * ball.visualScale;
      // The sprite ball is ~69% of its cell (88px in 128px), so we scale up
      // to match the intended radius, then 2x larger as requested
      const spriteScale = 1.5;
      const drawSize = r * 2 * spriteScale;

      // Advance sprite frame based on spin speed
      if (ball.flying && ball.rotationSpeed !== 0) {
        ballFrameAccum += Math.abs(ball.rotationSpeed) * 2.5;
        if (ballFrameAccum >= 1) {
          const steps = Math.floor(ballFrameAccum);
          ballFrameAccum -= steps;
          if (ball.rotationSpeed > 0) {
            ballFrame = (ballFrame + steps) % SPRITE_TOTAL;
          } else {
            ballFrame = (ballFrame - steps + SPRITE_TOTAL) % SPRITE_TOTAL;
          }
        }
      }

      // Ball shadow — positioned at ball center bottom
      // The sprite is drawn centered on ball.x, ball.y so shadow goes below
      const shadowR = drawSize * 0.35;
      if (!ball.flying) {
        ctx.fillStyle = 'rgba(0,0,0,0.2)';
        ctx.beginPath();
        ctx.ellipse(ball.x, ball.y + drawSize * 0.42, shadowR, shadowR * 0.3, 0, 0, Math.PI * 2);
        ctx.fill();
      }

      // Draw sprite frame
      if (ballSheetLoaded) {
        const col = ballFrame % SPRITE_COLS;
        const row = Math.floor(ballFrame / SPRITE_COLS);
        const sx = col * SPRITE_CELL;
        const sy = row * SPRITE_CELL;

        ctx.drawImage(
          ballSheet,
          sx, sy, SPRITE_CELL, SPRITE_CELL,
          ball.x - drawSize / 2, ball.y - drawSize / 2, drawSize, drawSize
        );
      } else {
        ctx.fillStyle = '#ddd';
        ctx.beginPath();
        ctx.arc(ball.x, ball.y, r, 0, Math.PI * 2);
        ctx.fill();
      }

      // Swipe-across hint when not flying
      if (!ball.flying && gameState === 'playing') {
        const hintY = ball.y - drawSize / 2 - 15;
        ctx.globalAlpha = 0.3 + Math.sin(Date.now() * 0.004) * 0.15;
        ctx.fillStyle = '#FFB27A';
        ctx.beginPath();
        ctx.moveTo(ball.x, hintY - 18);
        ctx.lineTo(ball.x - 12, hintY);
        ctx.lineTo(ball.x + 12, hintY);
        ctx.closePath();
        ctx.fill();
        ctx.globalAlpha = 1;
      }
    }

    function drawParticles() {
      for (const p of particles) {
        ctx.globalAlpha = p.life;
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;
    }

    function drawScorePopups() {
      for (const s of scorePopups) {
        ctx.globalAlpha = s.life;
        ctx.fillStyle = '#48A943';
        ctx.font = 'bold 28px Arial';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(s.text, s.x, s.y);
      }
      ctx.globalAlpha = 1;
    }

    function drawSwipeTrail() {
      // Determine which points to draw: active swipe or persisted trail
      let pts = null;
      let fadeAlpha = 1.0;

      if (touchActive && allTouchPoints.length >= 2) {
        pts = allTouchPoints;
      } else if (swipeTrailDisplay.length >= 2 && swipeTrailFade > 0) {
        pts = swipeTrailDisplay;
        fadeAlpha = swipeTrailFade;
        swipeTrailFade -= 0.015;
        if (swipeTrailFade <= 0) {
          swipeTrailDisplay = [];
        }
      }

      if (!pts) return;

      const startPt = pts[0];
      const endPt = pts[pts.length - 1];

      // ── Draw the center line (start → end) as a dashed line ──
      ctx.strokeStyle = `rgba(255, 255, 255, ${0.25 * fadeAlpha})`;
      ctx.lineWidth = 2;
      ctx.setLineDash([8, 6]);
      ctx.beginPath();
      ctx.moveTo(startPt.x, startPt.y);
      ctx.lineTo(endPt.x, endPt.y);
      ctx.stroke();
      ctx.setLineDash([]);

      // Compute center line normal for deviation coloring
      const lineDx = endPt.x - startPt.x;
      const lineDy = endPt.y - startPt.y;
      const lineLen = Math.sqrt(lineDx * lineDx + lineDy * lineDy);
      const nx = lineLen > 0 ? -lineDy / lineLen : 0;
      const ny = lineLen > 0 ? lineDx / lineLen : 0;

      // ── Draw the swipe path, colored by deviation from center line ──
      for (let i = 1; i < pts.length; i++) {
        const progress = i / pts.length;
        const alpha = (0.4 + progress * 0.4) * fadeAlpha;

        // Signed distance from center line: positive = right, negative = left
        const px = pts[i].x - startPt.x;
        const py = pts[i].y - startPt.y;
        const deviation = px * nx + py * ny;

        let color = `rgba(255, 255, 255, ${alpha})`;
        if (deviation > 5) {
          // Finger is RIGHT of center → ball will hook LEFT (green)
          const intensity = Math.min(1, deviation / 40);
          color = `rgba(${Math.round(72 + 183 * (1 - intensity))}, ${Math.round(169 + 86 * (1 - intensity))}, ${Math.round(67 + 188 * (1 - intensity))}, ${alpha})`;
        } else if (deviation < -5) {
          // Finger is LEFT of center → ball will hook RIGHT (orange)
          const intensity = Math.min(1, -deviation / 40);
          color = `rgba(${Math.round(255)}, ${Math.round(178 + 77 * (1 - intensity))}, ${Math.round(122 + 133 * (1 - intensity))}, ${alpha})`;
        }

        ctx.strokeStyle = color;
        ctx.lineWidth = 4 + progress * 3;
        ctx.lineCap = 'round';
        ctx.beginPath();
        ctx.moveTo(pts[i - 1].x, pts[i - 1].y);
        ctx.lineTo(pts[i].x, pts[i].y);
        ctx.stroke();
      }

      // Draw dots at each tracked point
      for (let i = 0; i < pts.length; i++) {
        const alpha = (0.15 + (i / pts.length) * 0.5) * fadeAlpha;
        ctx.fillStyle = `rgba(255, 255, 255, ${alpha})`;
        ctx.beginPath();
        ctx.arc(pts[i].x, pts[i].y, 2, 0, Math.PI * 2);
        ctx.fill();
      }

      // Start dot
      ctx.fillStyle = `rgba(72, 169, 67, ${0.7 * fadeAlpha})`;
      ctx.beginPath();
      ctx.arc(startPt.x, startPt.y, 6, 0, Math.PI * 2);
      ctx.fill();

      // End dot
      ctx.fillStyle = `rgba(255, 178, 122, ${0.7 * fadeAlpha})`;
      ctx.beginPath();
      ctx.arc(endPt.x, endPt.y, 6, 0, Math.PI * 2);
      ctx.fill();

      // Spin indicator
      if (pts.length >= 6) {
        const dev = calculateSpinDeviation(pts);
        if (Math.abs(dev) > 5) {
          // Positive dev = finger right = ball hooks left, negative = opposite
          const hookDir = dev > 0 ? '← HOOK' : 'HOOK →';
          ctx.fillStyle = dev > 0 ? `rgba(72, 169, 67, ${0.7 * fadeAlpha})` : `rgba(255, 178, 122, ${0.7 * fadeAlpha})`;
          ctx.font = 'bold 14px Arial';
          ctx.textAlign = 'center';
          ctx.fillText(hookDir, ball.x, ball.y + ball.radius * ball.visualScale + 25);
        }
      }
    }

    function drawHUD() {
      if (gameState !== 'playing') return;

      // HUD bar background
      ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
      roundRect(ctx, 10, 10, GW - 20, 50, 12);
      ctx.fill();

      // Border
      ctx.strokeStyle = 'rgba(255, 178, 122, 0.3)';
      ctx.lineWidth = 1;
      roundRect(ctx, 10, 10, GW - 20, 50, 12);
      ctx.stroke();

      // Timer icon + text (left side)
      ctx.fillStyle = timeLeft <= 10 ? '#ff4444' : '#FFB27A';
      ctx.font = 'bold 22px Arial';
      ctx.textAlign = 'left';
      ctx.textBaseline = 'middle';
      const timerStr = '⏱ ' + timeLeft + 's';
      ctx.fillText(timerStr, 28, 36);

      // Score (right side)
      ctx.fillStyle = '#48A943';
      ctx.font = 'bold 22px Arial';
      ctx.textAlign = 'right';
      ctx.fillText(score + ' pts', GW - 28, 36);
    }

    function roundRect(ctx, x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y);
      ctx.arcTo(x + w, y, x + w, y + r, r);
      ctx.lineTo(x + w, y + h - r);
      ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
      ctx.lineTo(x + r, y + h);
      ctx.arcTo(x, y + h, x, y + h - r, r);
      ctx.lineTo(x, y + r);
      ctx.arcTo(x, y, x + r, y, r);
      ctx.closePath();
    }

    // ============================================================
    // GAME LOOP
    // ============================================================
    function loop() {
      if (gameState === 'playing') {
        updateBall();
        updateParticles();
        updateScorePopups();
        // Remove dead balls older than 10 seconds
        const now = Date.now();
        deadBalls = deadBalls.filter(db => now - db.spawnTime < 10000);
      }
      draw();
      requestAnimationFrame(loop);
    }

    // ============================================================
    // BUTTON HANDLERS
    // ============================================================
    document.getElementById('startBtn').addEventListener('click', startGame);
    document.getElementById('replayBtn').addEventListener('click', startGame);

    // Start render loop
    spawnTargets();
    loop();
  </script>
</body>
</html>
